<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAG3R Gaming - Inicio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Exo 2', sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        .container {
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(139, 92, 246, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 50px;
            text-align: center;
        }

        h1 {
            font-family: 'Orbitron', monospace;
            font-size: 3rem;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #8b5cf6, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #c084fc;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .auth-section {
            margin-bottom: 40px;
            padding-bottom: 40px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.3);
        }


        input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(139, 92, 246, 0.5);
            border-radius: 8px;
            font-size: 14px;
            background: rgba(139, 92, 246, 0.1);
            color: white;
            margin-bottom: 15px;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        button {
            background: linear-gradient(45deg, #8b5cf6, #a855f7);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            margin-right: 10px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.5);
        }

        button.logout {
            background: linear-gradient(45deg, #ff6b6b, #ff5252);
            margin-left: 10px;
        }

        button.store {
            background: linear-gradient(45deg, #059669, #10b981);
            font-size: 1.1rem;
            padding: 15px 40px;
            width: 100%;
        }

        button.store:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.5);
        }

        button.logout:hover {
            background: #ff5252;
        }

        .welcome-section {
            margin-bottom: 40px;
        }

        .welcome-section p {
            font-size: 1.1rem;
            color: #ddd;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 2rem;
            }

            .btn-group {
                flex-direction: column;
            }

            button {
                width: 100%;
                margin: 0;
            }
        }

        button.delete {
            background: #ff6b6b;
            padding: 5px 10px;
            font-size: 12px;
        }

        button.delete:hover {
            background: #ff5252;
        }

        .hidden {
            display: none;
        }

        .products-section {
            margin-top: 30px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .product-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            background: #f9f9f9;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .product-card h3 {
            margin-bottom: 20px;
            font-weight: 500;
        }

        .alert.success {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.5);
        }

        .alert.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.5);
            margin: 10px 0;
        }

        .product-stock {
            color: #666;
            font-size: 14px;
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: 600;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 YAG3R GAMING</h1>
        <p class="subtitle">Bienvenido a la comunidad</p>

        <!-- Sección de Bienvenida -->
        <div class="welcome-section" id="welcomeSection">
            <p>Explora nuestros productos exclusivos y gestiona tu carrito de compras.</p>
            <div class="btn-group">
                <a href="tienda.html" style="text-decoration: none;">
                    <button class="store" onclick="">
                        <i class="fas fa-shopping-bag"></i> IR A LA TIENDA
                    </button>
                </a>
            </div>
        </div>

        <!-- Sección de Autenticación -->
        <div class="auth-section" id="authSection" style="display: none;">
            <h2 style="margin-bottom: 20px; color: #c084fc; font-family: 'Orbitron', monospace;">API - Gestión de Productos</h2>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" value="admin@YAG3R-TIENDA.com" />
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" value="admin123" />
            </div>
            <button onclick="login()">Iniciar Sesión</button>
        </div>

        <!-- Sección de Productos (oculta hasta login) -->
        <div class="products-section" id="productsSection" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="color: #c084fc; font-family: 'Orbitron', monospace;">Panel de Administrador</h2>
                <button class="logout" onclick="logout()">Cerrar Sesión</button>
            </div>

            <div class="form-group">
                <label for="productName">Nombre del Producto:</label>
                <input type="text" id="productName" placeholder="ej: Laptop" />
            </div>

            <div class="form-group">
                <label for="productPrice">Precio:</label>
                <input type="number" id="productPrice" placeholder="ej: 1200" />
            </div>

            <div class="form-group">
                <label for="productStock">Stock:</label>
                <input type="number" id="productStock" placeholder="ej: 10" />
            </div>

            <div class="form-group">
                <label for="productDescription">Descripción:</label>
                <input type="text" id="productDescription" placeholder="ej: Producto de alta calidad" />
            </div>

            <button onclick="createProduct()" style="width: 100%; margin-bottom: 20px;">Crear Producto</button>

            <!-- Alertas -->
            <div id="alert"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';

        // Mostrar panel de administrador
        function showAdminPanel() {
            document.getElementById('welcomeSection').style.display = 'none';
            document.getElementById('authSection').style.display = 'block';
        }

        // Utilidades
        function showAlert(message, type = 'success') {
            const alertDiv = document.getElementById('alert');
            alertDiv.innerHTML = `<div class="alert ${type}">${message}</div>`;
            setTimeout(() => {
                alertDiv.innerHTML = '';
            }, 4000);
        }

        function getToken() {
            return localStorage.getItem('authToken');
        }

        function setToken(token) {
            localStorage.setItem('authToken', token);
        }

        function removeToken() {
            localStorage.removeItem('authToken');
        }

        function isAuthenticated() {
            return !!getToken();
        }

        function toggleUI() {
            document.getElementById('authSection').classList.toggle('hidden');
            document.getElementById('productsSection').classList.toggle('hidden');
        }

        // Login
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showAlert('Por favor completa todos los campos', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    showAlert(data.error || 'Error en el login', 'error');
                    return;
                }

                setToken(data.token);
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('productsSection').style.display = 'block';
                showAlert('✅ Login exitoso', 'success');
            } catch (error) {
                showAlert('Error de conexión: ' + error.message, 'error');
            }
        }

        // Logout
        function logout() {
            removeToken();
            document.getElementById('authSection').style.display = 'block';
            document.getElementById('productsSection').style.display = 'none';
            showAlert('Sesión cerrada', 'success');
        }

        // Crear Producto
        async function createProduct() {
            const name = document.getElementById('productName').value;
            const price = document.getElementById('productPrice').value;
            const stock = document.getElementById('productStock').value;
            const description = document.getElementById('productDescription').value;

            if (!name || !price || !stock || !description) {
                showAlert('Por favor completa todos los campos', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/products/create`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getToken()}`
                    },
                    body: JSON.stringify({ name, price: parseFloat(price), stock: parseInt(stock), description })
                });

                const data = await response.json();

                if (!response.ok) {
                    showAlert(data.error || 'Error al crear producto', 'error');
                    return;
                }

                showAlert('✅ Producto creado correctamente', 'success');
                document.getElementById('productName').value = '';
                document.getElementById('productPrice').value = '';
                document.getElementById('productStock').value = '';
                document.getElementById('productDescription').value = '';
            } catch (error) {
                showAlert('Error de conexión: ' + error.message, 'error');
            }
        }

        // Inicializar
        window.addEventListener('load', () => {
            if (isAuthenticated()) {
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('productsSection').style.display = 'block';
                document.getElementById('welcomeSection').style.display = 'none';
            }
        });
    </script>
</body>
</html>
